plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.sytemupdate'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.sytemupdate'
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName '2.1-discreta'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.work:work-runtime:2.11.2'
}
